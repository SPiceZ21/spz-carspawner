<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Vehicle Depot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Panchang'; src: url('public/fonts/Panchang-Variable.ttf') format('truetype'); font-weight: 100 900; }

:root {
  --spz-bg: #07080A; --spz-surface-1: #0E1014; --spz-surface-2: #14171C; --spz-surface-3: #1B1F26; --spz-surface-4: #242932;
  --spz-line: rgba(255,255,255,0.07); --spz-line-faint: rgba(255,255,255,0.04); --spz-line-strong: rgba(255,255,255,0.13);
  --spz-fg-1: #F0F2F5; --spz-fg-2: #A8AEBB; --spz-fg-3: #5C6370; --spz-fg-4: #3A3F4A;
  --spz-orange: #FF6200; --spz-orange-soft: #FF9F63; --spz-orange-deep: #D14E00;
  --spz-success: #29D398; --spz-warning: #FFB020; --spz-danger: #FF3D55; --spz-purple: #B66BFF; --spz-info: #4DA8FF;
  --spz-font-display: 'Panchang', 'Inter', sans-serif;
  --spz-font-body: 'Inter', system-ui, sans-serif;
  --spz-font-mono: 'JetBrains Mono', monospace;
  --spz-radius-2: 4px; --spz-radius-3: 6px; --spz-radius-4: 8px; --spz-radius-pill: 9999px;
  --spz-shadow-3: 0 8px 24px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.4);
  --spz-shadow-glow-soft: 0 0 12px rgba(255,98,0,0.25), 0 0 0 1px rgba(255,98,0,0.15);
  --spz-dur-1: 80ms; --spz-dur-2: 140ms; --spz-ease-out: cubic-bezier(0,0,0.2,1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;background:transparent;font-family:var(--spz-font-body);font-size:13px;-webkit-font-smoothing:antialiased;}
::selection{background:var(--spz-orange);color:#000;}
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.spz-eyebrow{font-family:var(--spz-font-mono);font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--spz-fg-3);}
.spz-mono{font-family:var(--spz-font-mono);font-size:12px;font-variant-numeric:tabular-nums;}
.spz-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--spz-line);border-radius:var(--spz-radius-3);background:var(--spz-surface-2);color:var(--spz-fg-1);font-family:var(--spz-font-body);font-weight:500;font-size:13px;cursor:pointer;user-select:none;white-space:nowrap;transition:background var(--spz-dur-2) var(--spz-ease-out),border-color var(--spz-dur-2) var(--spz-ease-out);}
.spz-btn:hover{background:var(--spz-surface-3);border-color:var(--spz-line-strong);}
.spz-btn[data-variant="primary"]{background:var(--spz-orange);border-color:var(--spz-orange);color:#0A0A0A;font-weight:600;}
.spz-btn[data-variant="primary"]:hover{background:#ff7a26;box-shadow:var(--spz-shadow-glow-soft);}
.spz-btn[data-variant="ghost"]{background:transparent;border-color:transparent;color:var(--spz-fg-2);}
.spz-btn[data-variant="ghost"]:hover{background:var(--spz-surface-2);color:var(--spz-fg-1);}
.spz-btn[data-size="icon"]{width:32px;height:32px;padding:0;}
.spz-input{width:100%;height:32px;padding:0 10px;background:var(--spz-surface-1);border:1px solid var(--spz-line);border-radius:var(--spz-radius-3);color:var(--spz-fg-1);font-family:var(--spz-font-body);font-size:13px;}
.spz-input::placeholder{color:var(--spz-fg-3);}
.spz-input:focus{outline:none;border-color:var(--spz-orange);background:var(--spz-surface-2);}
.spz-badge{display:inline-flex;align-items:center;height:20px;padding:0 6px;border-radius:var(--spz-radius-2);font-family:var(--spz-font-mono);font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;background:var(--spz-surface-3);color:var(--spz-fg-2);border:1px solid var(--spz-line);}
.spz-badge[data-variant="orange"]{background:rgba(255,98,0,0.12);color:var(--spz-orange);border-color:rgba(255,98,0,0.3);}
.spz-kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;font-family:var(--spz-font-mono);font-size:10px;font-weight:600;background:var(--spz-surface-3);border:1px solid var(--spz-line-strong);border-bottom-width:2px;border-radius:3px;color:var(--spz-fg-2);}
*::-webkit-scrollbar{width:6px;} *::-webkit-scrollbar-track{background:transparent;} *::-webkit-scrollbar-thumb{background:var(--spz-surface-3);border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel">
/** @jsx h */
const { h, Fragment } = preact;
const { useState, useRef, useEffect } = preactHooks;

function Icon({ name, size = 14, strokeWidth = 1.75, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) window.lucide.createIcons({ nameAttr: 'data-lucide', icons: window.lucide.icons, attrs: {} });
  }, [name]);
  return <i ref={ref} data-lucide={name} style={{ width: size, height: size, display: 'inline-flex', strokeWidth }} {...rest} />;
}
function Badge({ variant, children, ...rest }) {
  return <span className="spz-badge" data-variant={variant} {...rest}>{children}</span>;
}
function Kbd({ children }) { return <span className="spz-kbd">{children}</span>; }
function Input(props) { return <input className="spz-input" {...props} />; }

function VehicleRow({ vehicle, onSpawn }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={() => onSpawn(vehicle.model)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '9px 10px', borderRadius: 4, cursor: 'pointer', marginBottom: 2,
        background: hover ? 'var(--spz-surface-2)' : 'transparent', transition: 'background 80ms',
      }}
    >
      <div>
        <div style={{ color: 'var(--spz-fg-1)', fontWeight: 500, fontSize: 13 }}>{vehicle.label}</div>
        <div className="spz-mono" style={{ color: 'var(--spz-fg-3)', fontSize: 11 }}>{vehicle.model.toUpperCase()}</div>
      </div>
      <Icon name="chevron-right" size={14} style={{ color: 'var(--spz-fg-3)' }} />
    </div>
  );
}

function App() {
  const [visible, setVisible] = useState(false);
  const [vehicles, setVehicles] = useState([]);
  const [query, setQuery] = useState('');

  useEffect(() => {
    const handler = (e) => {
      if (e.data.type === 'show') { setVehicles(e.data.vehicles || []); setQuery(''); setVisible(true); }
      else if (e.data.type === 'hide') setVisible(false);
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && visible) doClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [visible]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const doClose = () => {
    fetch(`https://${GetParentResourceName()}/close`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }).catch(() => {});
    setVisible(false);
  };
  const spawn = (model) => {
    fetch(`https://${GetParentResourceName()}/spawnVehicle`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model }) }).catch(() => {});
    setVisible(false);
  };

  const filtered = vehicles.filter(v =>
    v.label.toLowerCase().includes(query.toLowerCase()) || v.model.toLowerCase().includes(query.toLowerCase())
  );

  if (!visible) return null;

  return (
    <div className="overlay">
      <div style={{ width: 320, display: 'flex', flexDirection: 'column', maxHeight: '78vh', border: '1px solid var(--spz-line)', borderRadius: 8, background: 'var(--spz-surface-1)', boxShadow: 'var(--spz-shadow-3)', overflow: 'hidden' }}>
        <div style={{ padding: '16px 16px 12px', borderBottom: '1px solid var(--spz-line)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
            <span style={{ color: 'var(--spz-orange)', display: 'flex' }}><Icon name="car-front" size={18} /></span>
            <div>
              <div className="spz-eyebrow">Vehicle Depot</div>
              <div style={{ fontFamily: 'var(--spz-font-display)', fontWeight: 600, fontSize: 16, color: 'var(--spz-fg-1)', textTransform: 'uppercase', letterSpacing: '0.02em' }}>Select Machine</div>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--spz-fg-3)', display: 'flex', pointerEvents: 'none' }}><Icon name="search" size={13} /></span>
            <Input style={{ paddingLeft: 30 }} placeholder="Search vehicles…" value={query} onInput={e => setQuery(e.target.value)} autoFocus />
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '6px 8px' }}>
          {filtered.length === 0 && <div style={{ padding: '28px 0', textAlign: 'center', color: 'var(--spz-fg-3)', fontSize: 12 }}>No vehicles found</div>}
          {filtered.map(v => <VehicleRow key={v.model} vehicle={v} onSpawn={spawn} />)}
        </div>

        <div style={{ padding: '10px 14px', borderTop: '1px solid var(--spz-line)', display: 'flex', gap: 8, alignItems: 'center' }}>
          <Kbd>Esc</Kbd><span style={{ fontSize: 11, color: 'var(--spz-fg-3)' }}>close</span>
          <span style={{ color: 'var(--spz-fg-4)', fontSize: 11 }}>·</span>
          <Kbd>Click</Kbd><span style={{ fontSize: 11, color: 'var(--spz-fg-3)' }}>deploy</span>
          <div style={{ marginLeft: 'auto' }}><Badge variant="orange">{filtered.length} vehicles</Badge></div>
        </div>
      </div>
    </div>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
