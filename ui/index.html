<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Vehicle Depot</title>
<link rel="stylesheet" href="spz-ui.css">
<style>
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
  .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
/** @jsx h */
const { h, render } = preact;
const { useState, useEffect } = preactHooks;

function VehicleRow({ vehicle, onSpawn }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={() => onSpawn(vehicle.model)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '9px 10px', borderRadius: 4, cursor: 'pointer', marginBottom: 2,
        background: hover ? 'var(--spz-surface-2)' : 'transparent',
        transition: 'background 80ms',
      }}
    >
      <div>
        <div style={{ color: 'var(--spz-fg-1)', fontWeight: 500, fontSize: 13 }}>{vehicle.label}</div>
        <div className="spz-mono" style={{ color: 'var(--spz-fg-3)', fontSize: 11 }}>{vehicle.model.toUpperCase()}</div>
      </div>
      <Icon name="chevron-right" size={14} style={{ color: 'var(--spz-fg-3)' }} />
    </div>
  );
}

function App() {
  const [visible, setVisible] = useState(false);
  const [vehicles, setVehicles] = useState([]);
  const [query, setQuery] = useState('');

  useEffect(() => {
    const handler = (e) => {
      if (e.data.type === 'show') {
        setVehicles(e.data.vehicles || []);
        setQuery('');
        setVisible(true);
      } else if (e.data.type === 'hide') {
        setVisible(false);
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && visible) doClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [visible]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const doClose = () => {
    fetch(`https://${GetParentResourceName()}/close`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
    }).catch(() => {});
    setVisible(false);
  };

  const spawn = (model) => {
    fetch(`https://${GetParentResourceName()}/spawnVehicle`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model }),
    }).catch(() => {});
    setVisible(false);
  };

  const filtered = vehicles.filter(v =>
    v.label.toLowerCase().includes(query.toLowerCase()) ||
    v.model.toLowerCase().includes(query.toLowerCase())
  );

  if (!visible) return null;

  return (
    <div className="overlay">
      <div style={{
        width: 320, display: 'flex', flexDirection: 'column', maxHeight: '78vh',
        border: '1px solid var(--spz-line)', borderRadius: 'var(--spz-radius-4)',
        background: 'var(--spz-surface-1)', boxShadow: 'var(--spz-shadow-3)', overflow: 'hidden',
      }}>
        <div style={{ padding: '16px 16px 12px', borderBottom: '1px solid var(--spz-line)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
            <span style={{ color: 'var(--spz-orange)', display: 'flex' }}><Icon name="car-front" size={18} /></span>
            <div>
              <div className="spz-eyebrow">Vehicle Depot</div>
              <div style={{ fontFamily: 'var(--spz-font-display)', fontWeight: 600, fontSize: 16, color: 'var(--spz-fg-1)', textTransform: 'uppercase', letterSpacing: '0.02em' }}>Select Machine</div>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--spz-fg-3)', display: 'flex', pointerEvents: 'none' }}>
              <Icon name="search" size={13} />
            </span>
            <Input style={{ paddingLeft: 30 }} placeholder="Search vehicles…" value={query} onInput={e => setQuery(e.target.value)} autoFocus />
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '6px 8px' }}>
          {filtered.length === 0 && (
            <div style={{ padding: '28px 0', textAlign: 'center', color: 'var(--spz-fg-3)', fontSize: 12 }}>No vehicles found</div>
          )}
          {filtered.map(v => <VehicleRow key={v.model} vehicle={v} onSpawn={spawn} />)}
        </div>

        <div style={{ padding: '10px 14px', borderTop: '1px solid var(--spz-line)', display: 'flex', gap: 8, alignItems: 'center' }}>
          <Kbd>Esc</Kbd><span style={{ fontSize: 11, color: 'var(--spz-fg-3)' }}>close</span>
          <span style={{ color: 'var(--spz-fg-4)', fontSize: 11 }}>·</span>
          <Kbd>Click</Kbd><span style={{ fontSize: 11, color: 'var(--spz-fg-3)' }}>deploy</span>
          <div style={{ marginLeft: 'auto' }}><Badge variant="orange">{filtered.length} vehicles</Badge></div>
        </div>
      </div>
    </div>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
